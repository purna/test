# Drop this into .github/workflows/ of ANY repo.
# Clones pixelKanban and deploys it to gh-pages, wired to this repo's issues.
name: Deploy pixelKanban to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Commit message'
        required: false
        default: 'Deploy pixelKanban'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone pixelKanban source
        run: git clone https://github.com/purna/pixelKanban.git site

      - name: Remove workflows from source
        run: rm -rf site/.github

      - name: Patch config to this repo's issues
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s/defaultOwner: '.*'/defaultOwner: '$OWNER'/" site/js/config.js
          sed -i "s/defaultRepo: '.*'/defaultRepo: '$REPO'/" site/js/config.js

      - name: List files to deploy
        run: ls -la site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: ${{ inputs.message }}
