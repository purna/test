# Continuous deploy — triggers on push to main/master.
# Drop into .github/workflows/ of ANY repo.
name: Auto-Deploy pixelKanban

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone pixelKanban source
        run: git clone https://github.com/purna/pixelKanban.git _kanban_src

      - name: Patch config to this repo's issues
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          sed -i "s/defaultOwner: '.*'/defaultOwner: '$OWNER'/" _kanban_src/js/config.js
          sed -i "s/defaultRepo: '.*'/defaultRepo: '$REPO'/" _kanban_src/js/config.js

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _kanban_src
          publish_branch: gh-pages
          exclude_assets: '".github/"'
          commit_message: "Deploy pixelKanban — ${{ github.sha }}"
